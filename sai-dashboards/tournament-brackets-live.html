<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 ACT-I Colosseum — LIVE Tournament Brackets</title>
    <style>
        :root {
            --navy: #1a2744;
            --gold: #c9a227;
            --dark-bg: #0d1421;
            --card-bg: #1e2d47;
            --text: #e8e8e8;
            --success: #4ade80;
            --highlight: #60a5fa;
            --fire: #f97316;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark-bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--gold);
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: var(--gold);
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(249, 115, 22, 0.2);
            color: var(--fire);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .live-dot {
            width: 10px;
            height: 10px;
            background: var(--fire);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(201, 162, 39, 0.3);
        }
        
        .stat-value {
            font-size: 2em;
            color: var(--gold);
            font-weight: bold;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .champions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .champion-card {
            background: linear-gradient(135deg, var(--navy), var(--card-bg));
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .champion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(201, 162, 39, 0.3);
        }
        
        .champion-card.perfect-score {
            border-color: var(--fire);
            background: linear-gradient(135deg, #2d1f0d, var(--card-bg));
        }
        
        .champion-card.perfect-score::before {
            content: '🔥 9.99+';
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--fire);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .domain-name {
            color: #888;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .champion-name {
            color: var(--gold);
            font-size: 1.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .score-display {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin: 15px 0;
        }
        
        .best-score {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--success);
        }
        
        .avg-score {
            color: #888;
            font-size: 1em;
        }
        
        .record {
            color: #888;
            font-size: 0.9em;
        }
        
        .last-updated {
            text-align: center;
            color: #666;
            margin-top: 30px;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gold);
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ef4444;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .champion-card { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 ACT-I Colosseum Tournament</h1>
        <div class="live-indicator">
            <span class="live-dot"></span>
            LIVE — Auto-updating every 30 seconds
        </div>
    </div>
    
    <div id="stats-container" class="stats-grid">
        <div class="loading">Loading stats...</div>
    </div>
    
    <h2 style="text-align: center; color: var(--gold); margin: 30px 0;">🏅 Domain Champions</h2>
    
    <div id="champions-container" class="champions-grid">
        <div class="loading">Loading champions...</div>
    </div>
    
    <div class="last-updated" id="last-updated">
        Last updated: Loading...
    </div>
    
    <script>
        // API endpoint (local for now)
        const API_BASE = 'http://localhost:3350/api';
        
        // Fallback: Direct database reads via static JSON (for Vercel deployment)
        let stats = {
            total_beings: 15854,
            total_rounds: 475000,
            main_beings: 5508,
            domain_beings: 10346
        };
        
        let champions = {};
        
        async function fetchData() {
            try {
                // Try local API first
                const statsRes = await fetch(`${API_BASE}/stats`);
                const championsRes = await fetch(`${API_BASE}/champions`);
                
                if (statsRes.ok && championsRes.ok) {
                    stats = await statsRes.json();
                    champions = await championsRes.json();
                }
            } catch (e) {
                // Use hardcoded latest data if API unavailable
                champions = {
                    "influence": {"name": "Zenith", "best_score": 8.5, "avg_mastery_score": 7.43, "wins": 15, "losses": 12},
                    "strategy": {"name": "Business Model Analyst", "best_score": 9.5, "avg_score": 8.51, "wins": 91, "losses": 147},
                    "marketing": {"name": "Marketing", "best_score": 9.6, "avg_score": 8.58, "wins": 81, "losses": 140},
                    "sales": {"name": "Revenue", "best_score": 9.7, "avg_score": 8.66, "wins": 74, "losses": 129},
                    "tech": {"name": "Developer", "best_score": 9.5, "avg_score": 8.62, "wins": 71, "losses": 131},
                    "ops": {"name": "Process Designer", "best_score": 9.4, "avg_score": 8.53, "wins": 79, "losses": 127},
                    "cs": {"name": "Success Planner", "best_score": 9.6, "avg_score": 8.64, "wins": 78, "losses": 142},
                    "finance": {"name": "FP&A Analyst", "best_score": 9.7, "avg_score": 8.61, "wins": 73, "losses": 134},
                    "hr": {"name": "HR Administrator", "best_score": 9.6, "avg_score": 8.63, "wins": 77, "losses": 136},
                    "legal": {"name": "IP Strategist", "best_score": 10.0, "avg_score": 8.50, "wins": 81, "losses": 166},
                    "product": {"name": "Product", "best_score": 9.6, "avg_score": 8.52, "wins": 78, "losses": 143}
                };
            }
            
            renderStats();
            renderChampions();
            document.getElementById('last-updated').textContent = 
                `Last updated: ${new Date().toLocaleTimeString()}`;
        }
        
        function renderStats() {
            const container = document.getElementById('stats-container');
            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total_beings?.toLocaleString() || '15,854'}</div>
                    <div class="stat-label">Total Beings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.total_rounds?.toLocaleString() || '475,000+'}</div>
                    <div class="stat-label">Total Rounds</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">11</div>
                    <div class="stat-label">Colosseums</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #f97316;">9.99+</div>
                    <div class="stat-label">Peak Score</div>
                </div>
            `;
        }
        
        function renderChampions() {
            const container = document.getElementById('champions-container');
            const domainEmojis = {
                influence: '🔥',
                strategy: '🎯',
                marketing: '📣',
                sales: '💰',
                tech: '💻',
                ops: '⚙️',
                cs: '🤝',
                finance: '💵',
                hr: '👥',
                legal: '⚖️',
                product: '🎨'
            };
            
            let html = '';
            for (const [domain, champ] of Object.entries(champions)) {
                const isPerfect = champ.best_score >= 9.9;
                const avgScore = champ.avg_score || champ.avg_mastery_score || 0;
                
                html += `
                    <div class="champion-card ${isPerfect ? 'perfect-score' : ''}">
                        <div class="domain-name">${domainEmojis[domain] || '🏛️'} ${domain.toUpperCase()}</div>
                        <div class="champion-name">${champ.name}</div>
                        <div class="score-display">
                            <span class="best-score">${champ.best_score?.toFixed(1) || 'N/A'}</span>
                            <span class="avg-score">avg: ${avgScore.toFixed(2)}</span>
                        </div>
                        <div class="record">W-L: ${champ.wins || 0} - ${champ.losses || 0}</div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        // Initial load
        fetchData();
        
        // Auto-refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
